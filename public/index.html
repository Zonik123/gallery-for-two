<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Галерея для двоих</title>
    <style>
        *{box-sizing:border-box}body{font-family:system-ui;background:#f0f2f5;margin:0;padding:20px}.container{max-width:1300px;margin:0 auto}.login-box,.gallery-view{background:#fff;border-radius:24px;padding:2rem;max-width:400px;margin:100px auto}.gallery-view{max-width:none;display:none}input,button{padding:10px 16px;margin:8px 0;border-radius:40px;border:1px solid #cbd5e1}button{background:#3b82f6;color:#fff;border:none;cursor:pointer}.albums-list{display:flex;gap:10px;flex-wrap:wrap;margin:20px 0}.album-chip{background:#e2e8f0;padding:6px 16px;border-radius:40px;cursor:pointer}.album-chip.active{background:#3b82f6;color:#fff}.photos-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:1rem}.photo-card{background:#fff;border-radius:16px;overflow:hidden}.photo-card img{width:100%;aspect-ratio:1;object-fit:cover}.photo-info{padding:8px;display:flex;justify-content:space-between}.delete-btn{background:#ef4444;border:none;color:#fff;border-radius:20px;padding:4px 12px;cursor:pointer}.dropzone{border:2px dashed #cbd5e1;padding:2rem;text-align:center;border-radius:20px;margin:20px 0;cursor:pointer}.top-bar{display:flex;justify-content:space-between;align-items:center}.error{color:red}
    </style>
</head>
<body>
<div class="container">
    <div id="loginView" class="login-box">
        <h2>👥 Галерея для двоих</h2>
        <input type="text" id="loginUsername" placeholder="Логин (user1 или user2)"><br>
        <input type="password" id="loginPassword" placeholder="Пароль (pass123 / pass456)"><br>
        <button id="loginBtn">Войти</button>
        <div id="loginError" class="error"></div>
    </div>
    <div id="galleryView" class="gallery-view">
        <div class="top-bar">
            <h2>📸 Галерея для двоих</h2>
            <div><span id="currentUser"></span> <button id="logoutBtn">Выйти</button></div>
        </div>
        <input type="text" id="newAlbumName" placeholder="Название альбома">
        <button id="createAlbumBtn">+ Создать альбом</button>
        <div id="albumsList" class="albums-list"></div>
        <div id="dropzone" class="dropzone">📤 Нажми или перетащи фото</div>
        <input type="file" id="fileInput" multiple accept="image/*" style="display:none">
        <div id="photosContainer"></div>
    </div>
</div>
<script>
let currentAlbumId=null,currentUser=null;
async function api(url,opt={}){const r=await fetch(url,{...opt,credentials:'include'});if(!r.ok)throw Error(await r.text());return r.json();}
async function checkAuth(){try{const d=await api('/api/me');currentUser=d.username;document.getElementById('currentUser').innerText=currentUser;document.getElementById('loginView').style.display='none';document.getElementById('galleryView').style.display='block';await loadAlbums();}catch(e){document.getElementById('loginView').style.display='block';document.getElementById('galleryView').style.display='none';}}
async function loadAlbums(){const a=await api('/api/albums');const c=document.getElementById('albumsList');if(!a.length){c.innerHTML='<em>Нет альбомов. Создайте первый!</em>';return}c.innerHTML='';a.forEach(alb=>{const chip=document.createElement('div');chip.className='album-chip'+(currentAlbumId===alb.id?' active':'');chip.innerText=alb.name;chip.onclick=()=>{currentAlbumId=alb.id;loadAlbums();loadPhotos(alb.id);};c.appendChild(chip);});if(!currentAlbumId&&a.length){currentAlbumId=a[0].id;loadPhotos(currentAlbumId);loadAlbums();}}
async function loadPhotos(albumId){const p=await api(`/api/photos/${albumId}`);const cont=document.getElementById('photosContainer');if(!p.length){cont.innerHTML='<div>✨ Нет фото. Загрузите первое!</div>';return}const grid=document.createElement('div');grid.className='photos-grid';p.forEach(ph=>{const card=document.createElement('div');card.className='photo-card';card.innerHTML=`<img src="/uploads/${ph.filename}"><div class="photo-info"><span>📅 ${new Date(ph.timestamp).toLocaleDateString()} (${ph.uploaded_by})</span><button class="delete-btn" data-id="${ph.id}">🗑️</button></div>`;grid.appendChild(card);});cont.innerHTML='';cont.appendChild(grid);document.querySelectorAll('.delete-btn').forEach(btn=>{btn.onclick=async()=>{if(confirm('Удалить фото?')){await api(`/api/photo/${btn.dataset.id}`,{method:'DELETE'});loadPhotos(currentAlbumId);}};});}
async function uploadPhotos(files){if(!currentAlbumId)return alert('Выберите альбом');const fd=new FormData();for(let f of files)fd.append('photos',f);await fetch(`/api/upload/${currentAlbumId}`,{method:'POST',body:fd,credentials:'include'});loadPhotos(currentAlbumId);}
document.getElementById('loginBtn').onclick=async()=>{const u=document.getElementById('loginUsername').value,p=document.getElementById('loginPassword').value;try{await api('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});checkAuth();}catch(e){document.getElementById('loginError').innerText='Неверный логин или пароль';}};
document.getElementById('logoutBtn').onclick=async()=>{await api('/api/logout',{method:'POST'});checkAuth();};
document.getElementById('createAlbumBtn').onclick=async()=>{const name=document.getElementById('newAlbumName').value;if(!name)return alert('Введите название');await api('/api/albums',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name})});document.getElementById('newAlbumName').value='';loadAlbums();};
const dropzone=document.getElementById('dropzone'),fileInput=document.getElementById('fileInput');dropzone.onclick=()=>fileInput.click();fileInput.onchange=()=>{if(fileInput.files.length)uploadPhotos(fileInput.files);fileInput.value='';};dropzone.ondragover=(e)=>{e.preventDefault();dropzone.style.background='#eef2ff';};dropzone.ondragleave=()=>dropzone.style.background='#fafcff';dropzone.ondrop=(e)=>{e.preventDefault();dropzone.style.background='#fafcff';uploadPhotos(e.dataTransfer.files);};
checkAuth();
</script>
</body>
</html>
